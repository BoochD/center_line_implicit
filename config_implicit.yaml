# ============================================================
# Конфиг для ImplicitCurveNet
# ============================================================

# ---- Данные ----
datapath: "./cdata"
split_options_path: "afolds/foldx.yaml"

# ---- Модель ----
model:
  in_channels: 1
  depth: 5
  pe_num_freqs: 20
  branch_emb_dim: 20
  context_channels: 64
  mlp_hidden_dim: 256       # ширина скрытых слоёв MLP
  mlp_num_layers: 6         # глубина MLP
  local_feat_channels: 40   # сколько каналов локальных фичей семплировать в координатах γ(t); 0 — отключить point-conditioning
  num_refine_passes: 1      # сколько уточняющих проходов с локальными фичами поверх coarse-предсказания

# ---- Обучение ----
training:
  epochs: 1000
  stop_epochs: 1000           # early stopping
  batch_size: 4
  accumulation_steps: 1
  learning_rate: 5.0e-4
  lr_sched_factor: 0.6      # во сколько раз уменьшать LR при плато
  lr_sched_patience: 1000     # сколько эпох ждать без улучшения val MSD
  lr_sched_min_lr: 1.0e-6   # нижняя граница LR
  npoints_query: 512        # число случайных t на шаг на ветвь
  target_branch: "both"     # both / left / right: какую ветку обучать curve-loss'ами
  modelname: "model_implicit.pth"

# ---- Визуализация ----
visualization:
  vis_dir: "vis"            # папка для PNG
  vis_samples: 2            # сколько пациентов визуализировать каждую эпоху

# ---- Веса лоссов ----
losses:
  w_curve: 1.0
  w_plane: 0.1            
  w_length: 0.05
  w_smooth: 0.0
  w_sdf: 0.02
  w_inside: 0.001

# ---- ClearML ----
clearml:
  enabled: false
  project_name: "TreeNet"
  task_name: "ImplicitCurveNet"
